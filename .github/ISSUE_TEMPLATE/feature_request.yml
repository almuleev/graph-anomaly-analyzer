name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem and expected impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What is currently difficult or missing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      placeholder: How will this improve usability, reliability, or maintainability?
